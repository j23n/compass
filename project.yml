name: Compass
options:
    bundleIdPrefix: com.j23n.compass
    deploymentTarget:
        iOS: "18.0"
    xcodeVersion: "16.2"
    generateEmptyDirectories: true

settings:
    base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

packages:
    CompassData:
        path: Packages/CompassData
    CompassFIT:
        path: Packages/CompassFIT
    CompassBLE:
        path: Packages/CompassBLE
    CompassHealth:
        path: Packages/CompassHealth

targets:
    Compass:
        type: application
        platform: iOS
        info:
            path: Compass/Info.plist
            properties:
                UIBackgroundModes:
                    - bluetooth-central
                    - audio
                # Allow Files / share-sheet "Open in Compass" for GPX + FIT.
                LSSupportsOpeningDocumentsInPlace: true
                CFBundleDocumentTypes:
                    - CFBundleTypeName: GPX Course
                      CFBundleTypeRole: Viewer
                      LSHandlerRank: Alternate
                      LSItemContentTypes:
                          - com.topografix.gpx
                    - CFBundleTypeName: FIT Course
                      CFBundleTypeRole: Viewer
                      LSHandlerRank: Alternate
                      LSItemContentTypes:
                          - com.garmin.fit
                # Community-adopted UTIs (Apple doesn't issue official ones for
                # either). Import — not export — because we're declaring support
                # for types defined by others.
                UTImportedTypeDeclarations:
                    - UTTypeIdentifier: com.topografix.gpx
                      UTTypeDescription: GPS Exchange File
                      UTTypeConformsTo:
                          - public.xml
                      UTTypeTagSpecification:
                          public.filename-extension:
                              - gpx
                          public.mime-type:
                              - application/gpx+xml
                              - application/gpx
                              - application/xml+gpx
                    - UTTypeIdentifier: com.garmin.fit
                      UTTypeDescription: Garmin FIT File
                      UTTypeConformsTo:
                          - public.data
                      UTTypeTagSpecification:
                          public.filename-extension:
                              - fit
                          public.mime-type:
                              - application/vnd.ant.fit
        sources:
            - path: Compass
              excludes:
                  - "**/.DS_Store"
        settings:
            base:
                GENERATE_INFOPLIST_FILE: YES
                INFOPLIST_KEY_CFBundleDisplayName: Compass
                INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Compass connects to your fitness watch to sync activity and health data."
                INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Compass sends your location to the watch for sunrise/sunset and timezone."
                INFOPLIST_KEY_NSAppleMusicUsageDescription: "Compass shows now-playing info on your Garmin watch."
                INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Compass writes your Garmin watch's workouts, sleep, heart rate, respiration, blood oxygen, and step data into Apple Health so it appears alongside data from other devices."
                INFOPLIST_KEY_NSHealthShareUsageDescription: "Compass does not read data from Apple Health."
                INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
                INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
                INFOPLIST_KEY_UILaunchScreen_Generation: YES
                INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
                INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
                MARKETING_VERSION: "0.1.0"
                CURRENT_PROJECT_VERSION: 1
                CODE_SIGN_STYLE: Automatic
                CODE_SIGN_ENTITLEMENTS: Compass/Compass.entitlements
                ENABLE_PREVIEWS: YES
                PRODUCT_BUNDLE_IDENTIFIER: com.j23n.compass.app
            configs:
                Debug:
                    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
                    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
                Release:
                    SWIFT_COMPILATION_MODE: wholemodule
        postBuildScripts:
            - name: Set Build Number from Git
              script: |
                  BUILD=$(git -C "$SRCROOT" rev-list --count HEAD)
                  /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
        dependencies:
            - package: CompassData
            - package: CompassFIT
            - package: CompassBLE
            - package: CompassHealth
